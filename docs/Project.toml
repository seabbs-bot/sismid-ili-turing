# ScoringRules is the EpiAware fork, not the registered package; matches
# the root Project.toml / Manifest.toml source.
[sources.ScoringRules]
url = "https://github.com/EpiAware/ScoringRules.jl"
rev = "main"

# SismidILITuring itself is deliberately NOT a [deps]/[sources] entry
# here: that would need `name`/`uuid` in the root Project.toml to
# resolve, so a fresh `Pkg.instantiate()` would fail before make.jl's
# own robustness logic ever runs, breaking "the site builds cleanly even
# if the module is absent". docs/make.jl instead loads it with a plain
# `include`, using the deps already listed above.
